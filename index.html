<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DP Physics Past Paper Bank</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    margin-bottom:10px;
}

.header p{
    color:#cbd5e1;
}

.search-card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
}

.filters{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

select{
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:25px;
}

.result-card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

.open-btn{
    display:inline-block;
    margin-top:15px;
    background:#2563eb;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    text-decoration:none;
}

.open-btn:hover{
    background:#1d4ed8;
}

.countdown-card{
    background:linear-gradient(135deg,#1d4ed8,#2563eb);
    padding:25px;
    border-radius:20px;
    text-align:center;
    margin-bottom:30px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.countdown-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.countdown-subtitle{
    color:#dbeafe;
    margin-bottom:20px;
}

.days{
    font-size:64px;
    font-weight:bold;
    line-height:1;
}

.days-label{
    margin-bottom:20px;
}

.time-grid{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.time-box{
    min-width:90px;
}

.time-number{
    font-size:32px;
    font-weight:bold;
}

.time-label{
    font-size:13px;
    color:#dbeafe;
}

.motivation{
    margin-top:20px;
    font-weight:bold;
}
    
</style>
</head>

<body>

<div class="container">

<div class="countdown-card">

<div class="countdown-title">
🚀 IB DP Physics 2027
</div>

<div class="countdown-subtitle">
Days Remaining Until Examination Session
</div>



<div id="countdown"></div>

<div id="motivation" class="motivation"></div>

</div>

<div style="text-align:center; margin-bottom:30px;">

<div style="
background:linear-gradient(135deg,#16a34a,#22c55e);
padding:25px;
border-radius:20px;
text-align:center;
margin-bottom:30px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
">

<h2 style="
margin-top:0;
font-size:32px;
margin-bottom:10px;
">
🎯 Quick Exam Challenge
</h2>

<p style="
color:#dcfce7;
font-size:18px;
margin-bottom:20px;
">
Practice 5 Random Questions<br>
⏱ Timed Challenge • 📊 Instant Score
</p>

<a
href="simulator.html"
style="
display:inline-block;
background:white;
color:#15803d;
padding:15px 35px;
border-radius:12px;
font-weight:bold;
text-decoration:none;
font-size:20px;
">

🚀 START CHALLENGE

</a>

</div>

    

<div class="header">
<h1>🔍 DP Physics Past Paper Bank</h1>
<p>Find papers by Year, Session, Level and Timezone</p>
</div>

<div class="search-card">

<div class="filters">

<select id="year"></select>

<select id="session"></select>

<select id="level"></select>

<select id="tz"></select>

</div>

<button onclick="searchPapers()">
🔍 Search Papers
</button>

</div>

<div id="result" class="result"></div>

</div>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQf8dW-AzM9UkoCbThjwpoSp5_xAp7DWArNm1iEWSDj5EqyZ98er0bmkIUiZZ5EiJgz355G3UrTet1d/pub?output=csv";

let database = [];

fetch(csvUrl)
.then(response => response.text())
.then(csv => {

const rows = csv.trim().split("\n");

database = rows.slice(1).map(row => {

const cols = row.split(",");

return {
year: cols[0],
session: cols[1],
level: cols[2],
tz: cols[3],
link: cols[4]
};

});

populateFilters();

});

function populateFilters(){

fillDropdown("year","year");
fillDropdown("session","session");
fillDropdown("level","level");
fillDropdown("tz","tz");

}

function fillDropdown(id,key){

const dropdown = document.getElementById(id);

const values = [...new Set(database.map(item => item[key]))];

dropdown.innerHTML =
values.map(v => `<option>${v}</option>`).join("");

}

function searchPapers(){

const year =
document.getElementById("year").value;

const session =
document.getElementById("session").value;

const level =
document.getElementById("level").value;

const tz =
document.getElementById("tz").value;

const match = database.find(item =>

item.year === year &&
item.session === session &&
item.level === level &&
item.tz === tz

);

const result =
document.getElementById("result");

if(match){

result.innerHTML = `

<div class="result-card">

<h2>
${year} • ${session} • ${level} • ${tz}
</h2>

<p>
Past paper folder found.
</p>

<a
class="open-btn"
href="${match.link}"
target="_blank">

📁 Open Past Papers

</a>

</div>

`;

}else{

result.innerHTML = `

<div class="result-card">

No papers found.

</div>

`;

}

}

const examDate = new Date("2027-04-28T09:00:00");

function updateCountdown(){

    const now = new Date();
    const diff = examDate - now;

    if(diff <= 0){

        document.getElementById("countdown").innerHTML =
        "<h2>🎉 Exam Day Has Arrived!</h2>";

        return;
    }

    const days = Math.floor(diff/(1000*60*60*24));

    const hours = Math.floor(
        (diff%(1000*60*60*24))
        /(1000*60*60)
    );

    const minutes = Math.floor(
        (diff%(1000*60*60))
        /(1000*60)
    );

    const seconds = Math.floor(
        (diff%(1000*60))
        /1000
    );

    document.getElementById("countdown").innerHTML = `
    
    <div class="days">${days}</div>

    <div class="days-label">
    Days Remaining
    </div>

    <div class="time-grid">

        <div class="time-box">
            <div class="time-number">
            ${String(hours).padStart(2,"0")}
            </div>
            <div class="time-label">
            Hours
            </div>
        </div>

        <div class="time-box">
            <div class="time-number">
            ${String(minutes).padStart(2,"0")}
            </div>
            <div class="time-label">
            Minutes
            </div>
        </div>

        <div class="time-box">
            <div class="time-number">
            ${String(seconds).padStart(2,"0")}
            </div>
            <div class="time-label">
            Seconds
            </div>
        </div>

    </div>
    `;

    let motivation = "";

    if(days > 180){
        motivation = "📚 Build strong conceptual understanding.";
    }
    else if(days > 90){
        motivation = "📝 Start topic-by-topic revision.";
    }
    else if(days > 30){
        motivation = "🎯 Focus on past paper practice.";
    }
    else{
        motivation = "🚀 Final revision mode activated.";
    }

    document.getElementById("motivation").innerHTML =
    motivation;
}

updateCountdown();

setInterval(updateCountdown,1000);

    
</script>

</body>
</html>
