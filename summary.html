<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Question Summary</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
}

h1{
    text-align:center;
}

.answer{
    margin-bottom:20px;
    padding:15px;
    background:#334155;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>
📋 Question Summary
</h1>

<div class="card">

<h2>
📝 Known Quantities
</h2>

<div id="notes"></div>

</div>

<div class="card">

<h2>
📖 Question Review
</h2>

<div id="review"></div>

</div>

<button onclick="location.href='paper2.html'">

Start New Question

</button>

</div>

<script>

document.getElementById(
"notes"
).innerHTML =

localStorage.getItem(
"studentNotes"
).replace(/\n/g,"<br>");

const answers =
JSON.parse(
localStorage.getItem("answers")
|| "{}"
);

let html="";

for(let key in answers){

html += `
<div class="answer">

<b>${key}</b>

<br><br>

${answers[key]}

</div>
`;

}

document.getElementById(
"answers"
).innerHTML=html;

</script>

</body>
</html>
