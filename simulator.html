<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DP Physics Quick Challenge</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

.container{
    max-width:900px;
    margin:auto;
    padding:30px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
}

h1{
    text-align:center;
}

select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.timer{
    font-size:40px;
    font-weight:bold;
    text-align:center;
    margin:20px 0;
}

.question-image{
    width:100%;
    border-radius:10px;
}

.answers{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:20px;
}

.answer-btn{
    background:#334155;
}

.answer-btn:hover{
    background:#475569;
}

.hidden{
    display:none;
}

.result{
    text-align:center;
    font-size:24px;
}

</style>
</head>

<body>

<div class="container">

<div class="card" id="setup">

<h1>🎯 DP Physics Quick Challenge</h1>

<label>Topic</label>

<select id="topic">

<option>All Topics</option>

<option>A.1 Kinematics</option>
<option>A.2 Forces and momentum</option>
<option>A.3 Work, energy and power</option>
<option>A.4 Rigid body mechanics</option>
<option>A.5 Galilean and special relativity</option>

<option>B.1 Thermal energy transfers</option>
<option>B.2 Greenhouse effect</option>
<option>B.3 Gas laws</option>
<option>B.4 Thermodynamics</option>
<option>B.5 Current and circuits</option>

<option>C.1 Simple harmonic motion</option>
<option>C.2 Wave model</option>
<option>C.3 Wave phenomena</option>
<option>C.4 Standing waves and resonance</option>
<option>C.5 Doppler effect</option>

<option>D.1 Gravitational fields</option>
<option>D.2 Electric and magnetic fields</option>
<option>D.3 Motion in electromagnetic fields</option>
<option>D.4 Induction</option>

<option>E.1 Structure of the atom</option>
<option>E.2 Quantum physics</option>
<option>E.3 Radioactive decay</option>
<option>E.4 Fission</option>
<option>E.5 Fusion and stars</option>

</select>

<br><br>

<label>Difficulty</label>

<select id="difficulty">

<option>Easy</option>

<option>Medium</option>

<option>Hard</option>

<option>Mixed</option>

</select>

    
<button onclick="startQuiz()">
Start Challenge
</button>

</div>

<div id="quiz" class="hidden">

<div class="card">

<h2 id="questionNumber"></h2>

<div class="timer" id="timer">
90
</div>

<img
id="questionImage"
class="question-image"
>

<div class="answers">

<button class="answer-btn" onclick="submitAnswer('A')">A</button>

<button class="answer-btn" onclick="submitAnswer('B')">B</button>

<button class="answer-btn" onclick="submitAnswer('C')">C</button>

<button class="answer-btn" onclick="submitAnswer('D')">D</button>

</div>

</div>

</div>

<div id="results" class="hidden">

<div class="card result">

<h2>🎉 Challenge Complete</h2>

<p id="score"></p>

<button onclick="location.reload()">
Try Again
</button>

</div>

</div>

</div>

<script>

let questions=[];
let selectedQuestions=[];
let currentQuestion=0;
let score=0;
let timer;
let timeLeft=90;

let review=[];

fetch("questions.json")
.then(r=>r.json())
.then(data=>{
questions=data;
});

function startQuiz(){

let topic =
document.getElementById("topic").value;

let difficulty =
document.getElementById("difficulty").value;

let pool = questions;

if(topic !== "All Topics"){

    pool = pool.filter(
        q => q.topic === topic
    );

}

if(difficulty!=="Mixed"){

pool=
pool.filter(
q=>q.difficulty===difficulty
);

}

selectedQuestions=
pool
.sort(()=>Math.random()-0.5)
.slice(0,5);

document.getElementById("setup")
.classList.add("hidden");

document.getElementById("quiz")
.classList.remove("hidden");

showQuestion();

}

function showQuestion(){

if(currentQuestion>=selectedQuestions.length){

finishQuiz();

return;

}

const q=
selectedQuestions[currentQuestion];

document.getElementById(
"questionNumber"
).innerHTML=

`Question ${currentQuestion+1} of 5`;

document.getElementById(
"questionImage"
).src=q.image;

timeLeft=90;

document.getElementById(
"timer"
).innerHTML=timeLeft;

clearInterval(timer);

timer=setInterval(()=>{

timeLeft--;

document.getElementById(
"timer"
).innerHTML=timeLeft;

if(timeLeft<=0){

clearInterval(timer);

currentQuestion++;

showQuestion();

}

},1000);

}

function submitAnswer(choice){

clearInterval(timer);

const q=
selectedQuestions[currentQuestion];

if(choice===q.answer){

score++;

}

review.push({

image:q.image,
student:choice,
correct:q.answer

});

currentQuestion++;

showQuestion();

}

function finishQuiz(){

document.getElementById("quiz")
.classList.add("hidden");

document.getElementById("results")
.classList.remove("hidden");

let html = `

<h2>🎉 Challenge Complete</h2>

<p style="font-size:30px;">
Score: ${score} / 5
</p>

`;

review.forEach((r,index)=>{

html += `

<div style="
background:#334155;
padding:20px;
border-radius:15px;
margin-top:20px;
">

<h3>
Question ${index+1}
</h3>

<img
src="${r.image}"
style="
width:100%;
border-radius:10px;
margin-bottom:15px;
">

<p>
<b>Your Answer:</b>
${r.student}
</p>

<p>
<b>Correct Answer:</b>
${r.correct}
</p>

<p style="
font-size:20px;
font-weight:bold;
">

${r.student===r.correct
? "✅ Correct"
: "❌ Incorrect"}

</p>

</div>

`;

});

html += `

<br>

<button onclick="location.reload()">
Try Again
</button>

`;

document.getElementById("score")
.innerHTML = html;

}


</script>

</body>
</html>
