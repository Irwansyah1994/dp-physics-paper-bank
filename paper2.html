<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Paper 2 Simulator</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
}

h1{
    text-align:center;
}

img{
    width:100%;
    border-radius:10px;
    margin-top:15px;
}

.timer{
    font-size:40px;
    font-weight:bold;
    text-align:center;
    color:yellow;
    margin:20px 0;
}

textarea{
    width:100%;
    min-height:180px;
    margin-top:15px;
    border-radius:10px;
    padding:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:disabled{
    background:#64748b;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>
📝 Paper 2 Information Extraction
</h1>

<div class="timer" id="timer">
30
</div>

<img
src="images/P2/M23_TZ1/Q1/M23_TZ1_P2_Q1main.png"
>

<h2>
Known Quantities
</h2>

<textarea
id="notes"
placeholder="
Example:

u = 0 m/s

a = 2.5 m/s²

t = 4.0 s
">
</textarea>

<button
id="continueBtn"
disabled
onclick="goToQuestion()">

Continue →

</button>

</div>

</div>

<script>

let timeLeft = 30;

const timer =
setInterval(()=>{

timeLeft--;

document.getElementById("timer")
.innerHTML=timeLeft;

if(timeLeft<=0){

clearInterval(timer);

document.getElementById(
"continueBtn"
).disabled=false;

}

},1000);


function goToQuestion(){

localStorage.removeItem("answers");

localStorage.setItem(
"currentPart",
0
);
    
localStorage.setItem(
"studentNotes",
document.getElementById("notes").value
);

window.location.href =
"question.html";

}

    
</script>

</body>
</html>
